apiVersion: v1
kind: Secret
metadata:
  name: {{ include "golanglab5.r2SecretName" . }}
  labels:
    {{- include "golanglab5.labels" . | nindent 4 }}
type: Opaque
stringData:
  endpoint: {{ required "set r2.endpoint for Kubernetes deployment" .Values.r2.endpoint | quote }}
  accessKeyId: {{ required "set r2.accessKeyId for Kubernetes deployment" .Values.r2.accessKeyId | quote }}
  secretAccessKey: {{ required "set r2.secretAccessKey for Kubernetes deployment" .Values.r2.secretAccessKey | quote }}
